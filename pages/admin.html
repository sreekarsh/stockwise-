<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin - StockWise</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; padding: 2rem; }
    .admin-panel { max-width: 1000px; margin: 0 auto; }
    .user-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    .user-table th, .user-table td { padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
    .user-table th { color: var(--accent); font-weight: 600; }
    .btn { background: var(--accent); color: #000; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  </style>
</head>
<body>
  <div class="admin-panel">
    <h1>📊 Admin Panel - Registered Users</h1>
    <p id="loginPrompt">Please <a href="#" onclick="location.href='../index.html'">login</a> to view this page.</p>
    
    <h2 style="margin-top:2rem">🔐 Pending Password Resets</h2>
    <table class="user-table" id="resetTable" style="display:none">
      <thead>
        <tr>
          <th>User</th>
          <th>Email</th>
          <th>Token</th>
          <th>Expires</th>
        </tr>
      </thead>
      <tbody id="resetBody"></tbody>
    </table>
    <p id="noResets" style="color:var(--text2);display:none">No pending reset requests.</p>
    
    <h2 style="margin-top:2rem">👥 Registered Users</h2>
    <table class="user-table" id="userTable" style="display:none">
      <thead>
        <tr>
          <th>ID</th>
          <th>Username</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Created</th>
        </tr>
      </thead>
      <tbody id="userBody"></tbody>
    </table>
    <p style="color:var(--text2);margin-top:2rem">Owner Contact: <strong>9840173223</strong> | sreekarsh44@gmail.com</p>
  </div>
  <script src="../js/main.js"></script>
  <script>
    async function loadUsers() {
      const res = await fetch('/api/me', { credentials: 'include' });
      const me = await res.json();
      if (!me.loggedIn) return;
      
      try {
        const r = await fetch('/api/admin/users', { credentials: 'include' });
        const users = await r.json();
        document.getElementById('loginPrompt').style.display = 'none';
        document.getElementById('userTable').style.display = 'table';
        document.getElementById('userBody').innerHTML = users.map(u => `
          <tr>
            <td>${u.id}</td>
            <td>${u.username}</td>
            <td>${u.email}</td>
            <td>${u.phone || '-'}</td>
            <td>${new Date(u.created_at).toLocaleDateString()}</td>
          </tr>
        `).join('');
      } catch(e) {
        document.getElementById('loginPrompt').textContent = 'Access denied. Admin role required.';
      }
    }
    
    async function loadResetRequests() {
      try {
        const r = await fetch('/api/admin/reset-requests', { credentials: 'include' });
        const requests = await r.json();
        if (requests.length > 0) {
          document.getElementById('resetTable').style.display = 'table';
          document.getElementById('resetBody').innerHTML = requests.map(req => `
            <tr>
              <td>${req.username}</td>
              <td>${req.email}</td>
              <td style="font-family:monospace;font-size:0.85rem;word-break:break-all">${req.reset_token}</td>
              <td>${new Date(req.expires).toLocaleString()}</td>
            </tr>
          `).join('');
        } else {
          document.getElementById('noResets').style.display = 'block';
        }
      } catch(e) {
        console.error('Failed to load reset requests:', e);
      }
    }
    
    loadUsers();
    loadResetRequests();
  </script>
</body>
</html>
